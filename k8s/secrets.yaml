apiVersion: v1
kind: Secret
metadata:
  name: deepagents-secrets
type: Opaque
stringData:
  # ——— JWT ——————————————————————————————————————————
  SECRET_KEY: "your-super-secret-key-change-in-production"

  # ——— OpenSandbox ——————————————————————————————————————
  OPENSANDBOX_API_KEY: "your-api-key-here"
  OPENSANDBOX_DOMAIN: "api.opensandbox.io"
  OPENSANDBOX_IMAGE: "ubuntu"

  # ——— Redis ——————————————————————————————————————————
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_PASSWORD: ""

  # ——— SMTP（可选）—————————————————————————————————————
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@example.com"

  # ——— Webhook（可选）———————————————————————————————————
  WEBHOOK_URL: ""
